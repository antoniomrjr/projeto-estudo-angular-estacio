<main class="container mt-4">

  <h2 class="mb-4">Lista de Livros</h2>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Título</th>
        <th>Resumo</th>
        <th>Editora</th>
        <th>Autores</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let livro of livros"> <!-- lembrar do '*' antes do 'ngFor' -->

        <!-- criando título e botão de excluir -->
        <td>
          {{ livro.titulo }}
          <button 
            class="btn btn-danger btn-sm ms-2"
            (click)="excluir(livro.codigo)"> <!--eveto de clique -->
            Excluir
          </button>
        </td>

        <!-- resumo -->
        <td>
          {{ livro.resumo }}
        </td>

        <!-- editora -->
        <td>
          {{ obterNome(livro.codEditora) }} <!-- converte código em nome -->
        </td>

        <!-- autores -->
        <td>
          <ul class="mb-0">
            <li *ngFor="let autor of livro.autores"> <!-- repete uma linha pra cada livro -->
              {{ autor }}
            </li>
          </ul>
        </td>

      </tr>
    </tbody>
  </table>

</main>
