<main class="container mt-4">

  <h2 class="mb-4">Cadastro de Livro</h2>

  <form (submit)="incluir()" ngNativeValidate>

    <div class="mb-3">
      <label for="titulo" class="form-label">Título</label>
      <input
        type="text"
        id="titulo"
        name="titulo"
        class="form-control"
        [(ngModel)]="livro.titulo"
        required>
    </div>

    <div class="mb-3">
      <label for="resumo" class="form-label">Resumo</label>
      <textarea
        id="resumo"
        name="resumo"
        class="form-control"
        rows="4"
        [(ngModel)]="livro.resumo">
      </textarea>
    </div>

    <div class="mb-3">
      <label for="codEditora" class="form-label">Editora</label>
      <select
        id="codEditora"
        name="codEditora"
        class="form-select"
        [(ngModel)]="livro.codEditora"
        required>
        <option value="">Selecione uma editora</option>
        <option
          *ngFor="let editora of editoras"
          [ngValue]="editora.codEditora">
          {{ editora.nome }}
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label for="autores" class="form-label">Autores</label>
      <textarea
        id="autores"
        name="autores"
        class="form-control"
        rows="4"
        [(ngModel)]="autoresForm">
      </textarea>
      <small class="text-muted">Digite um autor por linha.</small>
    </div>

    <button type="submit" class="btn btn-primary">
      Incluir
    </button>

  </form>

</main>
